<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ÉcoDélices — Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="navbar"></div>

  <div class="container" style="padding:26px 0">
    <div class="card">
      <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;">
        <div>
          <h1>Dashboard admin</h1>
          <p class="small">Ajouter / supprimer des articles (stockés en LocalStorage).</p>
        </div>
        <button class="btn" id="logoutBtn">Déconnexion</button>
      </div>

      <hr style="border:none;border-top:1px solid rgba(0,0,0,.08);margin:14px 0;">

      <h2>Ajouter un article</h2>
      <form id="createPostForm" class="form-row">
        <input name="title" placeholder="Titre" required />
        <input name="category" placeholder="Catégorie (ex: Recettes)" />
        <input name="excerpt" placeholder="Résumé court" />
        <textarea name="content" placeholder="Contenu" required></textarea>
        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Publier</button>
          <span id="createMsg" class="small"></span>
        </div>
      </form>

      <div style="height:16px"></div>

      <h2>Articles</h2>
      <div id="adminPosts" class="list"></div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="../js/app.js"></script>
  <script src="../js/blog.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requireAdmin();
      adminLogout("logoutBtn");
      renderAdminPosts("adminPosts");
      adminCreatePost("createPostForm","createMsg");
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ÉcoDélices — Admin Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="navbar"></div>

  <div class="container" style="padding:26px 0">
    <div class="card">
      <h1>Connexion admin</h1>
      <p class="small">Démo : identifiants = <strong>admin</strong> / <strong>admin</strong></p>

      <form id="loginForm" class="form-row">
        <input name="username" placeholder="Username" required />
        <input name="password" type="password" placeholder="Password" required />
        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Se connecter</button>
          <span id="loginMsg" class="small"></span>
        </div>
      </form>
    </div>
  </div>

  <div id="footer"></div>

  <script src="../js/app.js"></script>
  <script src="../js/blog.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => adminLogin("loginForm","loginMsg"));
  </script>
</body>
</html>

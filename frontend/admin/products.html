<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Produits</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div id="navbar"></div>

  <div class="container" style="padding:30px 0;">
    <div class="card">
      <h1>Gestion Produits</h1>

      <form id="productForm" class="form-row">
        <input type="hidden" name="id">

        <input name="name" placeholder="Nom produit" required>
        <input name="category" placeholder="Catégorie">
        <input name="size" placeholder="Format">
        <input name="price" type="number" step="0.01" placeholder="Prix" required>
        <input name="image" placeholder="Chemin image (ex: ../img/fraise.jpg)">
        <textarea name="desc" placeholder="Description"></textarea>

        <div class="form-actions">
          <button class="btn btn-primary">Enregistrer</button>
          <button type="button" class="btn" id="cancelEditBtn" style="display:none;">Annuler</button>
          <span id="msg" class="small"></span>
        </div>
      </form>

      <div style="height:20px"></div>

      <div id="productsList" class="list"></div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="../js/app.js"></script>
  <script src="../js/blog.js"></script>
  <script src="../js/shop.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requireAdmin();
      renderAdminProducts("productsList");
      bindAdminProductForm("productForm","msg");
    });
  </script>

</body>
</html>

<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Boutique - ÉcoDélices</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="container" style="padding:26px 0">
    <h1>Boutique</h1>
    <p class="small">Découvrez nos confitures artisanales.</p>

    <div class="grid" id="productsGrid"></div>
  </main>

  <div id="footer"></div>

  <script src="../js/app.js"></script>
  <script src="../js/shop.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (window.renderNavbar) window.renderNavbar();
      if (window.renderFooter) window.renderFooter();

      // IMPORTANT: on n'affiche plus cartCount ici
      window.ecoShop.renderShop("productsGrid");
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panier — ÉcoDélices</title>

  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="container" style="padding:40px 0">

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <div>
        <h1>Mon panier</h1>
        <p class="small" id="cartCountLine">0 article(s)</p>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a class="btn" href="shop.html">Continuer mes achats</a>
        <button class="btn" id="clearCartBtn">Vider le panier</button>
        <a class="btn btn-primary" href="checkout.html">Passer à la caisse</a>
      </div>
    </div>

    <div id="cartItems" style="margin-top:30px;"></div>

    <div class="card" style="margin-top:20px;">
      <h3>Total</h3>
      <div style="font-size:24px;font-weight:800;" id="cartTotal">0.00 $</div>
    </div>

  </main>

  <div id="footer"></div>

  <script src="../js/app.js"></script>
  <script src="../js/shop.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (window.renderNavbar) renderNavbar();
      if (window.renderFooter) renderFooter();

      ecoShop.renderCart("cartItems","cartTotal","cartCountLine");
      ecoShop.bindClearCart("clearCartBtn");
    });
  </script>

</body>
</html>

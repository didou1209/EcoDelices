<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ÉcoDélices — Paiement</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css" />

  <style>
    /* ✅ Layout checkout propre */
    .checkout-grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 18px;
      align-items:start;
    }
    @media(max-width: 900px){
      .checkout-grid{ grid-template-columns: 1fr; }
    }
    .checkout-card-title{
      margin:0 0 10px;
      font-family: Montserrat, sans-serif;
      font-weight: 800;
      font-size: 22px;
    }
    .field-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media(max-width: 560px){
      .field-grid{ grid-template-columns: 1fr; }
    }
    .field label{
      display:block;
      font-size: 12px;
      opacity:.75;
      margin: 6px 0 6px;
    }
    .field input, .field textarea{
      width:100%;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.10);
      outline:none;
      background: rgba(255,255,255,.9);
      font-family: inherit;
    }
    .field textarea{ min-height: 110px; resize: vertical; }
    .checkout-actions{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
      align-items:center;
    }
    .right-summary .mini-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(0,0,0,.08);
    }
    .muted{ opacity:.75; }
    .msg{ margin-top: 10px; }
  </style>
</head>

<body>

  <!-- ✅ Navbar dynamique (comme tes autres pages) -->
  <div id="navbar"></div>

  <main class="container" style="padding:26px 0">
    <div class="grid" style="align-items:center">
      <div class="col-8">
        <h1 style="margin:0">Passer à la caisse</h1>
        <p class="small muted" style="margin-top:6px">Vérifie ton panier et confirme ton achat.</p>
      </div>
      <div class="col-4" style="text-align:right">
        <a class="btn" href="cart.html">← Retour panier</a>
      </div>
    </div>

    <div class="checkout-grid" style="margin-top:16px">

      <!-- ✅ Zone client -->
      <section class="card">
        <h2 class="checkout-card-title">Informations client</h2>

        <form id="checkoutForm">
          <div class="field-grid">
            <div class="field">
              <label>Prénom</label>
              <input name="firstName" placeholder="Ex: Jack" required>
            </div>

            <div class="field">
              <label>Nom</label>
              <input name="lastName" placeholder="Ex: Malber " required>
            </div>

            <div class="field">
              <label>Email</label>
              <input name="email" type="email" placeholder="exemple@email.com" required>
            </div>

            <div class="field">
              <label>Téléphone</label>
              <input name="phone" placeholder="514 000 0000" required>
            </div>

            <div class="field" style="grid-column:1/-1">
              <label>Adresse</label>
              <input name="address" placeholder="123 Rue Test" required>
            </div>

            <div class="field">
              <label>Ville</label>
              <input name="city" placeholder="Montréal" required>
            </div>

            <div class="field">
              <label>Code postal</label>
              <input name="postal" placeholder="H1H 1H1" required>
            </div>

            <div class="field" style="grid-column:1/-1">
              <label>Note (optionnel)</label>
              <textarea name="note" placeholder="Ex: Sonner à la porte, livraison après 18h..."></textarea>
            </div>
          </div>

          <div class="checkout-actions">
            <button class="btn btn-primary" type="submit">Confirmer l’achat</button>
            <a class="btn" href="shop.html">Continuer achats</a>
          </div>

          <p id="checkoutMsg" class="small msg"></p>
        </form>
      </section>

      <!-- ✅ Zone résumé -->
      <aside class="card right-summary">
        <h2 class="checkout-card-title">Résumé</h2>

        <div id="checkoutSummary"></div>

        <div class="mini-row">
          <div>
            <div class="small muted">Articles</div>
            <div style="font-weight:700" id="checkoutCount">0 article(s)</div>
          </div>

          <div style="text-align:right">
            <div class="small muted">Total</div>
            <div style="font-family:Montserrat,sans-serif;font-weight:900;font-size:24px" id="checkoutTotal">0.00 $</div>
          </div>
        </div>

      </aside>

    </div>
  </main>

  <div id="footer"></div>

  <!-- ✅ Scripts (IMPORTANT) -->
  <script src="../js/app.js"></script>
  <script src="../js/shop.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // ✅ affiche résumé + total
      window.ecoShop.renderCheckoutSummary("checkoutSummary", "checkoutTotal", "checkoutCount");
      // ✅ active le bouton Confirmer l’achat (POST /api/orders + redirect)
      window.ecoShop.bindCheckout("checkoutForm", "checkoutMsg");
    });
  </script>

</body>
</html>
